apiVersion: apps/v1
kind: Deployment
metadata:
  name: biopoint-api
  namespace: biopoint-staging
  labels:
    app: biopoint-api
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: biopoint-api
  template:
    metadata:
      labels:
        app: biopoint-api
        environment: staging
    spec:
      containers:
      - name: biopoint-api
        image: ${ECR_REGISTRY}/biopoint-api:${IMAGE_TAG}
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "staging"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: biopoint-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: biopoint-secrets
              key: jwt-secret
        - name: DOPPLER_TOKEN
          valueFrom:
            secretKeyRef:
              name: biopoint-secrets
              key: doppler-token
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL