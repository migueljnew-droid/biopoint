name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'apps/**'
      - 'packages/**'
      - 'db/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'apps/**'
      - 'packages/**'
      - 'db/**'

env:
  NODE_VERSION: '20'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --json > npm-audit-results.json
          
          # Check if there are any vulnerabilities
          VULN_COUNT=$(jq '.metadata.vulnerabilities.total' npm-audit-results.json)
          if [[ $VULN_COUNT -gt 0 ]]; then
            echo "Found $VULN_COUNT vulnerabilities"
            jq '.metadata.vulnerabilities' npm-audit-results.json
            
            # Fail only if there are high or critical vulnerabilities
            HIGH_VULNS=$(jq '.metadata.vulnerabilities.high' npm-audit-results.json)
            CRITICAL_VULNS=$(jq '.metadata.vulnerabilities.critical' npm-audit-results.json)
            
            if [[ $HIGH_VULNS -gt 0 ]] || [[ $CRITICAL_VULNS -gt 0 ]]; then
              echo "High or critical vulnerabilities found. Failing build."
              exit 1
            fi
          fi

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --json > snyk-results.json

      - name: Upload dependency scan results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: |
            npm-audit-results.json
            snyk-results.json

  code-security-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security tests
        run: |
          npm run test:security
          npm run encryption:validate
          npm run encryption:check

      - name: Check for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run Semgrep SAST scan
        uses: docker://semgrep/semgrep:latest
        with:
          args: >-
            semgrep scan
            --config p/typescript
            --config p/nodejs
            --config p/security-audit
            --config p/secrets
            --error
            --sarif --output semgrep-results.sarif
            apps/ packages/ db/

      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

      - name: Upload code security results
        uses: actions/upload-artifact@v4
        with:
          name: code-security-results
          path: |
            semgrep-results.sarif

  container-security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t biopoint-api:security-scan -f apps/api/Dockerfile .
          docker build -t biopoint-mobile:security-scan -f apps/mobile/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'biopoint-api:security-scan'
          format: 'sarif'
          output: 'trivy-api-results.sarif'

      - name: Run Trivy on mobile image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'biopoint-mobile:security-scan'
          format: 'sarif'
          output: 'trivy-mobile-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-api-results.sarif'

      - name: Run Docker Bench for Security
        run: |
          docker run --rm --pid host --privileged \
            -v /var/lib:/var/lib:ro \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            -v /usr/lib/systemd:/usr/lib/systemd:ro \
            -v /etc:/etc:ro \
            docker/docker-bench-security > docker-bench-results.txt

      - name: Upload container security results
        uses: actions/upload-artifact@v4
        with:
          name: container-security-results
          path: |
            trivy-api-results.sarif
            trivy-mobile-results.sarif
            docker-bench-results.txt

  infrastructure-security-scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Run tfsec security scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure/
          format: json
          out: tfsec-results.json

      - name: Upload infrastructure security results
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-security-results
          path: |
            checkov-results.sarif
            tfsec-results.json

  web-security-scan:
    name: Web Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for staging deployment
        run: |
          # Wait for staging to be ready
          for i in {1..30}; do
            if curl -f https://api-staging.biopoint.health/health; then
              echo "Staging is ready for security scan"
              break
            fi
            if [[ $i -eq 30 ]]; then
              echo "Staging not ready after 5 minutes"
              exit 1
            fi
            sleep 10
          done

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://api-staging.biopoint.health'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Run SSL Labs scan
        run: |
          curl -s "https://api.ssllabs.com/api/v3/analyze?host=api-staging.biopoint.health&publish=off&startNew=on" | jq '.' > ssl-labs-results.json

      - name: Run security headers check
        run: |
          curl -I https://api-staging.biopoint.health | tee security-headers.txt
          
          # Check for required security headers
          grep -q "X-Content-Type-Options" security-headers.txt || echo "Missing X-Content-Type-Options"
          grep -q "X-Frame-Options" security-headers.txt || echo "Missing X-Frame-Options"
          grep -q "X-XSS-Protection" security-headers.txt || echo "Missing X-XSS-Protection"
          grep -q "Strict-Transport-Security" security-headers.txt || echo "Missing Strict-Transport-Security"

      - name: Upload web security results
        uses: actions/upload-artifact@v4
        with:
          name: web-security-results
          path: |
            report_html.html
            ssl-labs-results.json
            security-headers.txt

  compliance-scan:
    name: Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Doppler
        uses: dopplerhq/cli-action@v3
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}

      - name: Run HIPAA compliance tests
        run: npm run test:compliance

      - name: Validate PHI encryption
        run: |
          npm run encryption:validate
          npm run encryption:check:detailed

      - name: Run audit logging validation
        run: |
          # Check audit log configuration
          node -e "
          const config = require('./apps/api/src/config/audit');
          if (!config.enabled) {
            console.error('Audit logging is not enabled');
            process.exit(1);
          }
          console.log('Audit logging is properly configured');
          "

      - name: Validate data retention policies
        run: |
          # Check data retention configuration
          node -e "
          const config = require('./apps/api/src/config/dataRetention');
          if (!config.phiRetentionDays || config.phiRetentionDays < 2555) {
            console.error('PHI retention policy is not compliant');
            process.exit(1);
          }
          console.log('Data retention policies are compliant');
          "

      - name: Upload compliance results
        uses: actions/upload-artifact@v4
        with:
          name: compliance-results
          path: |
            compliance-report.json
            encryption-validation.json
            audit-log-validation.json

  generate-security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-security-scan, container-security-scan, infrastructure-security-scan, web-security-scan, compliance-scan]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports/

      - name: Generate consolidated security report
        run: |
          cat > security-reports/security-summary.md << 'EOF'
          # BioPoint Security Scan Report
          
          **Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}
          
          ## Summary
          
          This report contains the results of automated security scans for the BioPoint application.
          
          ### Scans Performed
          
          - ✅ Dependency Vulnerability Scan (npm audit, Snyk)
          - ✅ Code Security Scan (ESLint, Semgrep, Gitleaks)
          - ✅ Container Security Scan (Trivy, Docker Bench)
          - ✅ Infrastructure Security Scan (Checkov, tfsec)
          - ✅ Web Security Scan (OWASP ZAP, SSL Labs)
          - ✅ Compliance Scan (HIPAA, PHI encryption)
          
          ### Artifacts
          
          All detailed scan results are available in the following artifacts:
          
          - dependency-scan-results
          - code-security-results
          - container-security-results
          - infrastructure-security-results
          - web-security-results
          - compliance-results
          
          ## Next Steps
          
          1. Review any high or critical vulnerabilities
          2. Address security findings as needed
          3. Re-run scans after fixes
          4. Update security documentation
          EOF

      - name: Upload consolidated security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-reports/

      - name: Notify security team
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#security-alerts'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: "🚨 Security scan failed for ${{ github.ref_name }}. Check the security report for details."