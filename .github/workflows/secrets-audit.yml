name: Secrets Audit & Security Scan

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - secrets
          - doppler
          - compliance

env:
  DOPPLER_PROJECT: biopoint

jobs:
  # Secret Detection Scan
  secret-detection:
    name: Secret Detection Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better secret detection

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      - name: Custom Secret Patterns Scan
        run: |
          echo "🔍 Scanning for custom secret patterns..."
          
          # Common secret patterns
          patterns=(
            "password\s*=\s*['\"][^'\"]{8,}['\"]"
            "api[_-]?key\s*=\s*['\"][a-zA-Z0-9]{16,}['\"]"
            "secret\s*=\s*['\"][a-zA-Z0-9]{16,}['\"]"
            "token\s*=\s*['\"][a-zA-Z0-9]{16,}['\"]"
            "jdbc:\/\/[^:]+:[^@]+@"
            "mongodb:\/\/[^:]+:[^@]+@"
          )
          
          found_secrets=false
          for pattern in "${patterns[@]}"; do
            if grep -r -i -E "$pattern" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.log"; then
              echo "❌ Found potential secrets matching pattern: $pattern"
              found_secrets=true
            fi
          done
          
          if [[ "$found_secrets" == "true" ]]; then
            echo "🚨 Potential secrets detected!"
            exit 1
          fi
          
          echo "✅ No custom secret patterns detected"

  # Doppler Configuration Audit
  doppler-audit:
    name: Doppler Configuration Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Doppler CLI
        uses: dopplerhq/cli-action@v3
        with:
          doppler-token: ${{ secrets.DOPPLER_AUDIT_TOKEN }}

      - name: Validate Doppler Configuration
        run: |
          echo "🔍 Validating Doppler configuration..."
          
          # Check if doppler.yaml exists
          if [[ ! -f "doppler.yaml" ]]; then
            echo "❌ doppler.yaml not found"
            exit 1
          fi
          
          # Validate YAML syntax
          if ! python3 -c "import yaml; yaml.safe_load(open('doppler.yaml'))" 2>/dev/null; then
            echo "❌ Invalid YAML syntax in doppler.yaml"
            exit 1
          fi
          
          echo "✅ doppler.yaml is valid"

      - name: Audit Doppler Secrets
        run: |
          echo "🔍 Auditing Doppler secrets..."
          
          environments=("dev" "staging" "production")
          audit_failed=false
          
          for env in "${environments[@]}"; do
            echo "📋 Auditing $env environment..."
            
            # Get secrets for this environment
            secrets_json=$(doppler secrets --project biopoint --config "$env" --json 2>/dev/null || echo "{}")
            secret_count=$(echo "$secrets_json" | jq -r 'keys | length')
            
            echo "  Found $secret_count secrets in $env"
            
            # Check for required secrets
            required_secrets=(
              "DATABASE_URL"
              "JWT_SECRET"
              "AWS_ACCESS_KEY_ID"
              "AWS_SECRET_ACCESS_KEY"
            )
            
            for secret in "${required_secrets[@]}"; do
              if ! echo "$secrets_json" | jq -e ".[\"$secret\"]" > /dev/null 2>&1; then
                echo "  ⚠️  Missing required secret: $secret"
                audit_failed=true
              fi
            done
            
            # Check for secrets that haven't been rotated
            echo "$secrets_json" | jq -r 'to_entries[] | select(.value.computed_at) | [.key, .value.computed_at] | @tsv' | while IFS=$'\t' read -r secret_name computed_at; do
              computed_timestamp=$(date -d "$computed_at" +%s 2>/dev/null || echo "0")
              current_timestamp=$(date +%s)
              days_old=$(((current_timestamp - computed_timestamp) / 86400))
              
              # Alert if secret is older than 90 days
              if [[ $days_old -gt 90 ]]; then
                echo "  ⚠️  Secret '$secret_name' is $days_old days old (consider rotation)"
              fi
            done
          done
          
          if [[ "$audit_failed" == "true" ]]; then
            echo "❌ Doppler audit failed"
            exit 1
          fi
          
          echo "✅ Doppler audit completed"

      - name: Check Doppler Activity Logs
        run: |
          echo "🔍 Checking Doppler activity logs..."
          
          # Get recent activity (last 24 hours)
          activity_json=$(doppler activity --project biopoint --json 2>/dev/null || echo "[]")
          
          # Check for suspicious activity
          suspicious_count=$(echo "$activity_json" | jq -r '[.[] | select(.type == "config.secrets.update" or .type == "config.secrets.delete")] | length')
          
          if [[ $suspicious_count -gt 10 ]]; then
            echo "⚠️  High number of secret modifications detected: $suspicious_count"
            echo "Recent activity:"
            echo "$activity_json" | jq -r '.[] | select(.type == "config.secrets.update" or .type == "config.secrets.delete") | [.timestamp, .user.name, .type] | @tsv' | head -10
          fi
          
          echo "✅ Activity log check completed"

  # Compliance Check
  compliance-check:
    name: HIPAA & Security Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HIPAA Compliance Scan
        run: |
          echo "🔍 Running HIPAA compliance scan..."
          
          # Check for PHI-related patterns
          phi_patterns=(
            "ssn\s*=\s*['\"][0-9]{3}-?[0-9]{2}-?[0-9]{4}['\"]"
            "dob\s*=\s*['\"][0-9]{1,2}/[0-9]{1,2}/[0-9]{2,4}['\"]"
            "patient[_-]?id\s*=\s*['\"][0-9]+['\"]"
            "mrn\s*=\s*['\"][0-9]+['\"]"
            "diagnosis\s*=\s*['\"][^'\"]+['\"]"
          )
          
          found_phi=false
          for pattern in "${phi_patterns[@]}"; do
            if grep -r -i -E "$pattern" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.log" --exclude="*.md"; then
              echo "❌ Found potential PHI data: $pattern"
              found_phi=true
            fi
          done
          
          if [[ "$found_phi" == "true" ]]; then
            echo "🚨 Potential PHI data detected in code!"
            echo "Please review and ensure no PHI is stored in plaintext."
          fi
          
          # Check for encryption requirements
          if grep -r "ENCRYPT" . --exclude-dir=node_modules --exclude-dir=.git | grep -v "ENCRYPTION"; then
            echo "⚠️  Check encryption implementation for compliance"
          fi
          
          echo "✅ HIPAA compliance scan completed"

      - name: Security Configuration Audit
        run: |
          echo "🔍 Auditing security configurations..."
          
          # Check for security headers
          if [[ -f "apps/api/src/app.ts" ]] || [[ -f "apps/api/src/server.ts" ]]; then
            echo "Checking for security middleware..."
            
            # Check for helmet
            if ! grep -r "helmet" apps/api/ --include="*.ts" --include="*.js"; then
              echo "⚠️  Helmet middleware not detected - consider adding for security headers"
            fi
            
            # Check for CORS configuration
            if ! grep -r "cors" apps/api/ --include="*.ts" --include="*.js"; then
              echo "⚠️  CORS middleware not detected"
            fi
            
            # Check for rate limiting
            if ! grep -r "rateLimit\|express-rate-limit" apps/api/ --include="*.ts" --include="*.js"; then
              echo "⚠️  Rate limiting not detected"
            fi
          fi
          
          # Check for input validation
          if grep -r "req.body" apps/api/ --include="*.ts" --include="*.js" | grep -v "validation\|sanitize\|zod\|joi\|yup"; then
            echo "⚠️  Input validation may be missing in some endpoints"
          fi
          
          echo "✅ Security configuration audit completed"

  # Environment Variables Validation
  env-validation:
    name: Environment Variables Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Environment Variable Usage
        run: |
          echo "🔍 Validating environment variable usage..."
          
          # Check for hardcoded values that should be environment variables
          hardcoded_patterns=(
            "localhost:3000"
            "http://localhost"
            "postgresql://postgres:password@"
            "mongodb://localhost:27017"
            "redis://localhost:6379"
          )
          
          found_hardcoded=false
          for pattern in "${hardcoded_patterns[@]}"; do
            if grep -r "$pattern" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.log" --exclude="*.md" --exclude="*.test.ts" --exclude="*.spec.ts"; then
              echo "❌ Found hardcoded value that should be environment variable: $pattern"
              found_hardcoded=true
            fi
          done
          
          if [[ "$found_hardcoded" == "true" ]]; then
            echo "🚨 Hardcoded configuration values detected!"
            exit 1
          fi
          
          # Check for proper environment variable access
          if grep -r "process.env" apps/api/ --include="*.ts" --include="*.js" | grep -v "process.env."; then
            echo "⚠️  Check for proper environment variable access patterns"
          fi
          
          echo "✅ Environment variable validation completed"

      - name: Check .env Files in Repository
        run: |
          echo "🔍 Checking for .env files in repository..."
          
          # Look for any .env files that might have been accidentally committed
          env_files=$(find . -name ".env*" -type f ! -path "./node_modules/*" ! -path "./.git/*" ! -path "./.doppler/*")
          
          if [[ -n "$env_files" ]]; then
            echo "❌ Found .env files in repository (security risk):"
            echo "$env_files"
            echo ""
            echo "🚨 These files should be removed and added to .gitignore"
            exit 1
          fi
          
          echo "✅ No .env files found in repository"

  # Generate Security Report
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [secret-detection, doppler-audit, compliance-check, env-validation]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Security Report
        run: |
          echo "📊 Generating security report..."
          
          # Create security report
          cat > security-report.md << 'EOF'
          # BioPoint Security Audit Report
          
          **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Workflow Run**: ${{ github.run_id }}
          **Trigger**: ${{ github.event_name }}
          
          ## Scan Results Summary
          
          EOF
          
          # Add job results
          jobs=("secret-detection" "doppler-audit" "compliance-check" "env-validation")
          for job in "${jobs[@]}"; do
            result="${{ needs[$job].result }}"
            status="✅ PASSED"
            if [[ "$result" == "failure" ]]; then
              status="❌ FAILED"
            elif [[ "$result" == "skipped" ]]; then
              status="⚠️  SKIPPED"
            fi
            echo "- **$job**: $status" >> security-report.md
          done
          
          cat >> security-report.md << 'EOF'
          
          ## Recommendations
          
          ### Immediate Actions Required
          - Review any failed scans and address security issues
          - Ensure all secrets are properly managed in Doppler
          - Verify no hardcoded credentials in codebase
          
          ### Long-term Improvements
          - Implement automated secret rotation
          - Set up security monitoring and alerting
          - Regular security training for development team
          
          ## Resources
          - [Secrets Management Documentation](docs/secrets-management.md)
          - [Doppler Configuration](doppler.yaml)
          - [Security Best Practices](docs/security-best-practices.md)
          
          ---
          *This report was generated automatically by GitHub Actions*
          EOF
          
          # Display report
          cat security-report.md
          
          # Upload report as artifact
          echo "security-report.md" > report-files.txt

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_id }}
          path: |
            security-report.md
            report-files.txt
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Security Audit Results\n\n${report}`
            });

      - name: Notify on Security Issues
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = `
            ## 🚨 Security Alert
            
            Security audit failed for workflow run: ${{ github.run_id }}
            
            **Repository**: ${{ github.repository }}
            **Branch**: ${{ github.ref }}
            **Commit**: ${{ github.sha }}
            **Triggered by**: ${{ github.event_name }}
            
            Please review the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) and address the security issues immediately.
            
            **Assigned to**: @security-team
            **Priority**: High
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security Alert - ${{ github.repository }} - ${{ github.ref }}`,
              body: issueBody,
              labels: ['security', 'high-priority', 'automated']
            });