name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
      - 'infrastructure/environments/**'
      - '.github/workflows/terraform-*.yml'
  
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: 'dev'
      
      confirm_deployment:
        description: 'Confirm deployment to production'
        required: true
        type: boolean
        default: false

env:
  TF_VERSION: '1.6.0'
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
  TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
  TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}
  TF_VAR_doppler_service_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        environment: ${{ github.event.inputs.environment && fromJSON(format('["{0}"]', github.event.inputs.environment)) || fromJSON('["dev", "staging", "production"]') }}
        include:
          - environment: dev
            tf_workspace: dev
            requires_approval: false
          - environment: staging
            tf_workspace: staging
            requires_approval: false
          - environment: production
            tf_workspace: production
            requires_approval: true
    
    environment:
      name: ${{ matrix.environment }}
      url: https://${{ matrix.environment == 'production' && 'biopoint.app' || format('{0}.biopoint.app', matrix.environment) }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Production Deployment Approval
      if: matrix.environment == 'production' && github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ github.event.inputs.confirm_deployment }}" != "true" ]; then
          echo "❌ Production deployment requires manual confirmation"
          exit 1
        fi
        echo "✅ Production deployment confirmed"
        
    - name: Terraform Init
      run: |
        cd infrastructure/terraform
        terraform init -backend=true -backend-config="workspace_key_prefix=workspaces"
        
    - name: Terraform Workspace Select
      run: |
        cd infrastructure/terraform
        terraform workspace select ${{ matrix.tf_workspace }} || terraform workspace new ${{ matrix.tf_workspace }}
        
    - name: Terraform Plan
      id: plan
      run: |
        cd infrastructure/terraform
        terraform plan -var-file=../environments/${{ matrix.environment }}.tfvars -out=tfplan-${{ matrix.environment }}
        
    - name: Terraform Apply
      if: steps.plan.outcome == 'success'
      run: |
        cd infrastructure/terraform
        terraform apply -auto-approve tfplan-${{ matrix.environment }}
        
    - name: Export Terraform Outputs
      id: outputs
      run: |
        cd infrastructure/terraform
        echo "terraform_outputs<<EOF" >> $GITHUB_OUTPUT
        terraform output -json >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Update Application Configuration
      run: |
        # Export outputs as environment variables for application deployment
        cd infrastructure/terraform
        
        # Create environment file for application
        cat > ../app-config-${{ matrix.environment }}.env << EOF
        # Auto-generated configuration for ${{ matrix.environment }} environment
        $(terraform output -raw environment_variables 2>/dev/null || echo "# No environment variables available")
        EOF
        
        echo "✅ Application configuration updated for ${{ matrix.environment }}"
        
    - name: Upload Configuration
      uses: actions/upload-artifact@v4
      with:
        name: app-config-${{ matrix.environment }}
        path: infrastructure/app-config-${{ matrix.environment }}.env
        retention-days: 7
        
    - name: Deployment Notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
        text: |
          🚀 **BioPoint Infrastructure Deployment**
          
          **Environment:** ${{ matrix.environment }}
          **Status:** ${{ job.status }}
          **Triggered by:** ${{ github.actor }}
          **Commit:** ${{ github.sha }}
          
          ${{ job.status == 'success' && '✅ Deployment completed successfully!' || '❌ Deployment failed. Check logs for details.' }}
          
    - name: Create Deployment Record
      if: success()
      run: |
        # Create deployment record for audit purposes
        DEPLOYMENT_ID=$(date +%s)
        cat > deployment-${{ matrix.environment }}-${DEPLOYMENT_ID}.json << EOF
        {
          "deployment_id": "${DEPLOYMENT_ID}",
          "environment": "${{ matrix.environment }}",
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "commit_sha": "${{ github.sha }}",
          "triggered_by": "${{ github.actor }}",
          "status": "success",
          "infrastructure_outputs": ${{ steps.outputs.outputs.terraform_outputs }}
        }
        EOF
        
        echo "✅ Deployment record created: deployment-${{ matrix.environment }}-${DEPLOYMENT_ID}.json"
        
  post-deployment:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Health Checks
      run: |
        # Run health checks for all environments
        for env in dev staging production; do
          echo "Running health checks for $env environment..."
          
          # API health check
          api_url="https://api.$env.biopoint.app/health"
          if [ "$env" = "production" ]; then
            api_url="https://api.biopoint.app/health"
          fi
          
          response=$(curl -s -o /dev/null -w "%{http_code}" $api_url || echo "000")
          echo "API Health ($env): $response"
          
          # Application health check
          app_url="https://app.$env.biopoint.app/health"
          if [ "$env" = "production" ]; then
            app_url="https://app.biopoint.app/health"
          fi
          
          response=$(curl -s -o /dev/null -w "%{http_code}" $app_url || echo "000")
          echo "App Health ($env): $response"
        done
        
    - name: Update Deployment Documentation
      run: |
        # Update deployment documentation with latest deployment info
        cat > infrastructure/deployment-history.md << EOF
        # Infrastructure Deployment History
        
        ## Latest Deployment
        - **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
        - **Commit:** ${{ github.sha }}
        - **Triggered by:** ${{ github.actor }}
        - **Status:** ${{ job.status }}
        
        ## Deployment Environments
        - ✅ Development
        - ✅ Staging  
        - ✅ Production
        
        ## Next Steps
        1. Monitor application health
        2. Review monitoring dashboards
        3. Validate data integrity
        4. Update documentation
        
        EOF
        
    - name: Cleanup Old Artifacts
      run: |
        # Cleanup old plan artifacts (keep last 10)
        echo "Cleaning up old artifacts..."
        # This would typically be handled by GitHub's artifact retention policy