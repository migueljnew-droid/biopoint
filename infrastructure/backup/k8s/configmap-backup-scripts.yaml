apiVersion: v1
kind: ConfigMap
metadata:
  name: biopoint-backup-scripts
  namespace: biopoint
  labels:
    app: biopoint-backup
    component: scripts
data:
  backup-database.sh: |
    #!/bin/bash
    # BioPoint Database Backup Script
    # Automated backup system for Neon PostgreSQL with HIPAA compliance
    set -euo pipefail
    
    # Configuration
    BACKUP_TYPE="${1:-daily}"
    TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
    DATE=$(date -u +"%Y-%m-%d")
    
    # Validate environment
    required_vars=("DATABASE_URL" "AWS_REGION" "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY" "S3_BUCKET_NAME" "ENCRYPTION_KEY")
    for var in "${required_vars[@]}"; do
        if [[ -z "${!var:-}" ]]; then
            echo "ERROR: Required environment variable $var is not set"
            exit 1
        fi
    done
    
    # Setup directories
    BACKUP_BASE_DIR="/tmp/biopoint-backups"
    BACKUP_DIR="$BACKUP_BASE_DIR/$BACKUP_TYPE"
    LOG_FILE="$BACKUP_DIR/backup-$TIMESTAMP.log"
    S3_BACKUP_BUCKET="${S3_BUCKET_NAME}-backups"
    S3_BACKUP_PREFIX="database/$BACKUP_TYPE"
    
    mkdir -p "$BACKUP_DIR"
    echo "[$(date -u +"%Y-%m-%d %H:%M:%S UTC")] Starting $BACKUP_TYPE database backup" | tee "$LOG_FILE"
    
    # Validate database connection
    echo "Validating database connection..." | tee -a "$LOG_FILE"
    if ! psql "$DATABASE_URL" -c "SELECT 1;" > /dev/null 2>&1; then
        echo "ERROR: Unable to connect to database" | tee -a "$LOG_FILE"
        exit 1
    fi
    
    # Get database info
    DB_NAME=$(echo "$DATABASE_URL" | sed -n 's/.*\/\/.*\/\(.*\)/\1/p')
    DB_SIZE=$(psql "$DATABASE_URL" -t -c "SELECT pg_size_pretty(pg_database_size(current_database()));" | xargs)
    echo "Database: $DB_NAME, Size: $DB_SIZE" | tee -a "$LOG_FILE"
    
    # Create encryption key
    ENCRYPTION_KEY_FILE="/tmp/backup-key-$TIMESTAMP.key"
    openssl rand -base64 32 > "$ENCRYPTION_KEY_FILE"
    chmod 600 "$ENCRYPTION_KEY_FILE"
    
    # Perform backup based on type
    case "$BACKUP_TYPE" in
        "daily")
            echo "Performing daily backup..." | tee -a "$LOG_FILE"
            BACKUP_FILE="$BACKUP_DIR/biopoint-daily-$TIMESTAMP.sql"
            
            pg_dump --dbname="$DATABASE_URL" --format=custom --verbose --file="$BACKUP_FILE" --no-owner --no-privileges --clean --if-exists 2>&1 | tee -a "$LOG_FILE"
            
            BACKUP_SIZE=$(stat -f%z "$BACKUP_FILE" 2>/dev/null || stat -c%s "$BACKUP_FILE" 2>/dev/null || echo "0")
            BACKUP_SIZE_MB=$((BACKUP_SIZE / 1024 / 1024))
            
            # Encrypt backup
            ENCRYPTED_FILE="$BACKUP_FILE.enc"
            openssl enc -AES-256-CBC -salt -in "$BACKUP_FILE" -out "$ENCRYPTED_FILE" -pass file:"$ENCRYPTION_KEY_FILE"
            
            ENCRYPTED_SIZE=$(stat -f%z "$ENCRYPTED_FILE" 2>/dev/null || stat -c%s "$ENCRYPTED_FILE" 2>/dev/null || echo "0")
            ENCRYPTED_SIZE_MB=$((ENCRYPTED_SIZE / 1024 / 1024))
            
            # Upload to S3
            S3_KEY="$S3_BACKUP_PREFIX/biopoint-daily-$TIMESTAMP.sql.enc"
            aws s3 cp "$ENCRYPTED_FILE" "s3://$S3_BACKUP_BUCKET/$S3_KEY" --server-side-encryption-configuration 'Rules=[{ApplyServerSideEncryptionByDefault={SSEAlgorithm=AES256}}]' --metadata "backup-type=daily,db-size=$DB_SIZE,backup-size=$BACKUP_SIZE"
            
            # Upload encryption key
            aws s3 cp "$ENCRYPTION_KEY_FILE" "s3://$S3_BACKUP_BUCKET/$S3_BACKUP_PREFIX/keys/key-$TIMESTAMP.key" --server-side-encryption-configuration 'Rules=[{ApplyServerSideEncryptionByDefault={SSEAlgorithm=AES256}}]'
            
            echo "Daily backup completed: ${ENCRYPTED_SIZE_MB}MB uploaded to s3://$S3_BACKUP_BUCKET/$S3_KEY" | tee -a "$LOG_FILE"
            ;;
            
        "weekly"|"monthly")
            echo "Performing $BACKUP_TYPE backup..." | tee -a "$LOG_FILE"
            
            # Schema backup
            BACKUP_FILE="$BACKUP_DIR/biopoint-$BACKUP_TYPE-schema-$TIMESTAMP.sql"
            pg_dump --dbname="$DATABASE_URL" --format=plain --schema-only --verbose --file="$BACKUP_FILE" --no-owner --no-privileges 2>&1 | tee -a "$LOG_FILE"
            
            # Critical data backup
            DATA_BACKUP_FILE="$BACKUP_DIR/biopoint-$BACKUP_TYPE-data-$TIMESTAMP.sql"
            CRITICAL_TABLES=("User" "Profile" "LabReport" "LabMarker" "AuditLog" "ComplianceEvent")
            
            for table in "${CRITICAL_TABLES[@]}"; do
                echo "-- Data for table: $table" >> "$DATA_BACKUP_FILE"
                pg_dump --dbname="$DATABASE_URL" --format=plain --data-only --table="public.$table" --no-owner --no-privileges 2>&1 | tee -a "$DATA_BACKUP_FILE"
            done
            
            # Encrypt and upload both files
            for file in "$BACKUP_FILE" "$DATA_BACKUP_FILE"; do
                if [[ -f "$file" ]]; then
                    openssl enc -AES-256-CBC -salt -in "$file" -out "$file.enc" -pass file:"$ENCRYPTION_KEY_FILE"
                    
                    filename=$(basename "$file")
                    S3_KEY="$S3_BACKUP_PREFIX/${filename}.enc"
                    aws s3 cp "$file.enc" "s3://$S3_BACKUP_BUCKET/$S3_KEY" --server-side-encryption-configuration 'Rules=[{ApplyServerSideEncryptionByDefault={SSEAlgorithm=AES256}}]' --metadata "backup-type=$BACKUP_TYPE"
                fi
            done
            
            # Upload encryption key
            aws s3 cp "$ENCRYPTION_KEY_FILE" "s3://$S3_BACKUP_BUCKET/$S3_BACKUP_PREFIX/keys/key-$TIMESTAMP.key" --server-side-encryption-configuration 'Rules=[{ApplyServerSideEncryptionByDefault={SSEAlgorithm=AES256}}]'
            
            echo "$BACKUP_TYPE backup completed successfully" | tee -a "$LOG_FILE"
            ;;
            
        *)
            echo "ERROR: Invalid backup type: $BACKUP_TYPE" | tee -a "$LOG_FILE"
            exit 1
            ;;
    esac
    
    # Cleanup
    rm -f "$ENCRYPTION_KEY_FILE" "$BACKUP_FILE" "$ENCRYPTED_FILE"
    
    echo "Backup completed successfully at $(date -u +"%Y-%m-%d %H:%M:%S UTC")" | tee -a "$LOG_FILE"
    
  backup-s3.sh: |
    #!/bin/bash
    # BioPoint S3/R2 Storage Backup Script
    # Automated backup system for Cloudflare R2/S3 with cross-region replication
    set -euo pipefail
    
    BACKUP_TYPE="${1:-incremental}"
    TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
    
    # Validate environment
    required_vars=("AWS_REGION" "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY" "S3_BUCKET_NAME")
    for var in "${required_vars[@]}"; do
        if [[ -z "${!var:-}" ]]; then
            echo "ERROR: Required environment variable $var is not set"
            exit 1
        fi
    done
    
    # Setup directories
    BACKUP_BASE_DIR="/tmp/biopoint-s3-backups"
    BACKUP_DIR="$BACKUP_BASE_DIR/$BACKUP_TYPE"
    LOG_FILE="$BACKUP_DIR/backup-$TIMESTAMP.log"
    S3_SOURCE_BUCKET="$S3_BUCKET_NAME"
    S3_BACKUP_BUCKET="${S3_BUCKET_NAME}-backups"
    S3_BACKUP_PREFIX="s3-backups/$BACKUP_TYPE"
    CROSS_REGION_ENABLED="${CROSS_REGION_BACKUP:-false}"
    
    mkdir -p "$BACKUP_DIR"
    echo "[$(date -u +"%Y-%m-%d %H:%M:%S UTC")] Starting $BACKUP_TYPE S3 backup" | tee "$LOG_FILE"
    
    # Validate S3 access
    echo "Validating S3 access..." | tee -a "$LOG_FILE"
    if ! aws s3 ls "s3://$S3_SOURCE_BUCKET" > /dev/null 2>&1; then
        echo "ERROR: Unable to access source bucket: $S3_SOURCE_BUCKET" | tee -a "$LOG_FILE"
        exit 1
    fi
    
    # Get bucket statistics
    echo "Analyzing source bucket..." | tee -a "$LOG_FILE"
    BUCKET_SIZE=$(aws s3 ls "s3://$S3_SOURCE_BUCKET" --recursive --summarize | grep "Total Size:" | awk '{print $3}')
    OBJECT_COUNT=$(aws s3 ls "s3://$S3_SOURCE_BUCKET" --recursive --summarize | grep "Total Objects:" | awk '{print $3}')
    echo "Source bucket: $OBJECT_COUNT objects, $BUCKET_SIZE bytes" | tee -a "$LOG_FILE"
    
    # Ensure backup bucket exists
    if ! aws s3 ls "s3://$S3_BACKUP_BUCKET" > /dev/null 2>&1; then
        echo "Creating backup bucket: $S3_BACKUP_BUCKET" | tee -a "$LOG_FILE"
        aws s3 mb "s3://$S3_BACKUP_BUCKET"
        
        # Configure versioning and lifecycle
        aws s3api put-bucket-versioning --bucket "$S3_BACKUP_BUCKET" --versioning-configuration Status=Enabled
    fi
    
    # Perform backup based on type
    case "$BACKUP_TYPE" in
        "full")
            echo "Performing full S3 backup..." | tee -a "$LOG_FILE"
            
            # Sync all objects
            SYNC_LOG="$BACKUP_DIR/sync-$TIMESTAMP.log"
            aws s3 sync "s3://$S3_SOURCE_BUCKET" "s3://$S3_BACKUP_BUCKET/$S3_BACKUP_PREFIX/$TIMESTAMP/" \
                --metadata-directive COPY \
                --server-side-encryption AES256 \
                --storage-class STANDARD \
                2>&1 | tee "$SYNC_LOG"
            
            OBJECTS_SYNCED=$(grep -c "copy:" "$SYNC_LOG" || echo "0")
            echo "Full backup completed: $OBJECTS_SYNCED objects synced" | tee -a "$LOG_FILE"
            ;;
            
        "incremental")
            echo "Performing incremental S3 backup..." | tee -a "$LOG_FILE"
            
            # Find the last successful backup
            LAST_BACKUP=$(aws s3 ls "s3://$S3_BACKUP_BUCKET/$S3_BACKUP_PREFIX/" --recursive | grep "metadata-" | sort | tail -1 | awk '{print $4}' | sed 's|/[^/]*$||' || echo "")
            
            if [[ -n "$LAST_BACKUP" ]]; then
                echo "Last backup found: $LAST_BACKUP" | tee -a "$LOG_FILE"
                
                # Use size-only for faster incremental sync
                SYNC_LOG="$BACKUP_DIR/sync-$TIMESTAMP.log"
                aws s3 sync "s3://$S3_SOURCE_BUCKET" "s3://$S3_BACKUP_BUCKET/$S3_BACKUP_PREFIX/$TIMESTAMP/" \
                    --metadata-directive COPY \
                    --server-side-encryption AES256 \
                    --size-only \
                    2>&1 | tee "$SYNC_LOG"
                
                OBJECTS_SYNCED=$(grep -c "copy:" "$SYNC_LOG" || echo "0")
                echo "Incremental backup completed: $OBJECTS_SYNCED objects synced" | tee -a "$LOG_FILE"
            else
                echo "No previous backup found, performing full backup instead" | tee -a "$LOG_FILE"
                exec "$0" "full"
            fi
            ;;
            
        *)
            echo "ERROR: Invalid backup type: $BACKUP_TYPE" | tee -a "$LOG_FILE"
            exit 1
            ;;
    esac
    
    # Cross-region replication if enabled
    if [[ "$CROSS_REGION_ENABLED" == "true" ]]; then
        S3_CROSS_REGION_BUCKET="${S3_BUCKET_NAME}-backups-dr"
        echo "Performing cross-region replication..." | tee -a "$LOG_FILE"
        
        if ! aws s3 ls "s3://$S3_CROSS_REGION_BUCKET" > /dev/null 2>&1; then
            echo "Creating cross-region backup bucket: $S3_CROSS_REGION_BUCKET" | tee -a "$LOG_FILE"
            aws s3 mb "s3://$S3_CROSS_REGION_BUCKET" || echo "WARNING: Unable to create cross-region bucket" | tee -a "$LOG_FILE"
        fi
        
        # Replicate to cross-region bucket
        aws s3 sync "s3://$S3_BACKUP_BUCKET/$S3_BACKUP_PREFIX/$TIMESTAMP/" \
            "s3://$S3_CROSS_REGION_BUCKET/$S3_BACKUP_PREFIX/$TIMESTAMP/" \
            --metadata-directive COPY \
            --server-side-encryption AES256 \
            2>&1 | tee "$BACKUP_DIR/cross-region-$TIMESTAMP.log"
        
        echo "Cross-region replication completed" | tee -a "$LOG_FILE"
    fi
    
    echo "S3 backup completed successfully at $(date -u +"%Y-%m-%d %H:%M:%S UTC")" | tee -a "$LOG_FILE"
    
  verify-backups.sh: |
    #!/bin/bash
    # BioPoint Backup Verification Script
    # Comprehensive verification of database and S3 backups
    set -euo pipefail
    
    VERIFICATION_TYPE="${1:-weekly}"
    TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
    
    # Validate environment
    required_vars=("DATABASE_URL" "AWS_REGION" "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY" "S3_BUCKET_NAME" "ENCRYPTION_KEY")
    for var in "${required_vars[@]}"; do
        if [[ -z "${!var:-}" ]]; then
            echo "ERROR: Required environment variable $var is not set"
            exit 1
        fi
    done
    
    # Setup directories
    VERIFY_DIR="/tmp/biopoint-verify/$TIMESTAMP"
    LOG_FILE="$VERIFY_DIR/verification-$TIMESTAMP.log"
    REPORT_FILE="$VERIFY_DIR/verification-report-$TIMESTAMP.md"
    S3_BACKUP_BUCKET="${S3_BUCKET_NAME}-backups"
    
    mkdir -p "$VERIFY_DIR"
    echo "[$(date -u +"%Y-%m-%d %H:%M:%S UTC")] Starting backup verification: $VERIFICATION_TYPE" | tee "$LOG_FILE"
    
    OVERALL_STATUS="PASS"
    ERRORS=0
    WARNINGS=0
    
    echo "=== BioPoint Backup Verification Report ===" > "$REPORT_FILE"
    echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$REPORT_FILE"
    echo "Verification Type: $VERIFICATION_TYPE" >> "$REPORT_FILE"
    echo "" >> "$REPORT_FILE"
    
    # 1. Verify Database Backups
    echo "## Database Backup Verification" >> "$REPORT_FILE"
    LATEST_DB_BACKUP=$(aws s3 ls "s3://$S3_BACKUP_BUCKET/database/daily/" --recursive | grep "\.sql\.enc$" | sort | tail -1)
    
    if [[ -z "$LATEST_DB_BACKUP" ]]; then
        echo "❌ FAIL: No database backups found" >> "$REPORT_FILE"
        ((ERRORS++))
        OVERALL_STATUS="FAIL"
    else
        BACKUP_DATE=$(echo "$LATEST_DB_BACKUP" | awk '{print $1}')
        BACKUP_KEY=$(echo "$LATEST_DB_BACKUP" | awk '{print $4}')
        BACKUP_SIZE=$(echo "$LATEST_DB_BACKUP" | awk '{print $3}')
        BACKUP_SIZE_MB=$((BACKUP_SIZE / 1024 / 1024))
        
        echo "✅ PASS: Latest database backup found" >> "$REPORT_FILE"
        echo "   - Date: $BACKUP_DATE" >> "$REPORT_FILE"
        echo "   - Size: ${BACKUP_SIZE_MB}MB" >> "$REPORT_FILE"
        echo "   - Location: $BACKUP_KEY" >> "$REPORT_FILE"
        
        # Verify backup integrity
        echo "   - Verifying backup integrity..." >> "$REPORT_FILE"
        BACKUP_FILE="$VERIFY_DIR/$(basename "$BACKUP_KEY")"
        
        if aws s3 cp "s3://$S3_BACKUP_BUCKET/$BACKUP_KEY" "$BACKUP_FILE" > /dev/null 2>&1; then
            # Check if file appears encrypted
            if file "$BACKUP_FILE" | grep -q "data"; then
                echo "   ✅ PASS: Backup appears to be encrypted" >> "$REPORT_FILE"
            else
                echo "   ⚠️  WARN: Backup format unexpected" >> "$REPORT_FILE"
                ((WARNINGS++))
            fi
            rm -f "$BACKUP_FILE"
        else
            echo "   ❌ FAIL: Unable to download backup for verification" >> "$REPORT_FILE"
            ((ERRORS++))
            OVERALL_STATUS="FAIL"
        fi
    fi
    
    # 2. Verify S3 Backups
    echo "" >> "$REPORT_FILE"
    echo "## S3 Backup Verification" >> "$REPORT_FILE"
    LATEST_S3_BACKUP=$(aws s3 ls "s3://$S3_BACKUP_BUCKET/s3-backups/" --recursive | grep "metadata-" | sort | tail -1)
    
    if [[ -z "$LATEST_S3_BACKUP" ]]; then
        echo "❌ FAIL: No S3 backups found" >> "$REPORT_FILE"
        ((ERRORS++))
        OVERALL_STATUS="FAIL"
    else
        S3_BACKUP_DATE=$(echo "$LATEST_S3_BACKUP" | awk '{print $1}')
        S3_BACKUP_KEY=$(echo "$LATEST_S3_BACKUP" | awk '{print $4}')
        
        echo "✅ PASS: Latest S3 backup found" >> "$REPORT_FILE"
        echo "   - Date: $S3_BACKUP_DATE" >> "$REPORT_FILE"
        echo "   - Location: $S3_BACKUP_KEY" >> "$REPORT_FILE"
    fi
    
    # 3. Verify Retention Policies
    echo "" >> "$REPORT_FILE"
    echo "## Retention Policy Verification" >> "$REPORT_FILE"
    
    DAILY_BACKUPS=$(aws s3 ls "s3://$S3_BACKUP_BUCKET/database/daily/" --recursive | grep "\.sql\.enc$" | wc -l)
    WEEKLY_BACKUPS=$(aws s3 ls "s3://$S3_BACKUP_BUCKET/database/weekly/" --recursive | grep "\.sql\.enc$" | wc -l)
    
    echo "Daily backups: $DAILY_BACKUPS (expected: 5-7)" >> "$REPORT_FILE"
    echo "Weekly backups: $WEEKLY_BACKUPS (expected: 4+)" >> "$REPORT_FILE"
    
    if [[ $DAILY_BACKUPS -ge 5 ]]; then
        echo "✅ PASS: Daily backup retention adequate" >> "$REPORT_FILE"
    else
        echo "⚠️  WARN: Low daily backup count" >> "$REPORT_FILE"
        ((WARNINGS++))
    fi
    
    # Final summary
    echo "" >> "$REPORT_FILE"
    echo "## Summary" >> "$REPORT_FILE"
    echo "Overall Status: $OVERALL_STATUS" >> "$REPORT_FILE"
    echo "Errors: $ERRORS" >> "$REPORT_FILE"
    echo "Warnings: $WARNINGS" >> "$REPORT_FILE"
    
    echo "Verification completed: $OVERALL_STATUS ($ERRORS errors, $WARNINGS warnings)" | tee -a "$LOG_FILE"
    
    # Upload report to S3
    aws s3 cp "$REPORT_FILE" "s3://$S3_BACKUP_BUCKET/verification-reports/verification-report-$TIMESTAMP.md" --server-side-encryption-configuration 'Rules=[{ApplyServerSideEncryptionByDefault={SSEAlgorithm=AES256}}]' > /dev/null 2>&1 || true
    
    exit $([[ "$OVERALL_STATUS" == "FAIL" ]] && echo 1 || echo 0)