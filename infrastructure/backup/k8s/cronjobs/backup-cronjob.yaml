apiVersion: batch/v1
kind: CronJob
metadata:
  name: biopoint-database-backup-daily
  namespace: biopoint
  labels:
    app: biopoint-backup
    component: database
    schedule: daily
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: biopoint-backup
            component: database
            schedule: daily
        spec:
          serviceAccountName: biopoint-backup-sa
          restartPolicy: OnFailure
          containers:
          - name: database-backup
            image: postgres:15-alpine
            command:
            - /bin/sh
            - -c
            - |
              # Install required tools
              apk add --no-cache \
                bash \
                openssl \
                aws-cli \
                curl \
                jq \
                bc
              
              # Execute backup from local scripts
              cd /scripts
              ./backup-database.sh daily
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: biopoint-secrets
                  key: database-url
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: biopoint-aws-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: biopoint-aws-credentials
                  key: secret-access-key
            - name: S3_BUCKET_NAME
              value: "biopoint-uploads"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: biopoint-encryption-keys
                  key: backup-encryption-key
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: biopoint-monitoring
                  key: slack-webhook-url
                  optional: true
            - name: ALERT_EMAIL
              value: "infrastructure@biopoint.com"
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"
            volumeMounts:
            - name: backup-scripts
              mountPath: /scripts
            - name: tmp-storage
              mountPath: /tmp
          volumes:
          - name: backup-scripts
            configMap:
              name: biopoint-backup-scripts
              defaultMode: 0755
          - name: tmp-storage
            emptyDir: {}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 2000
---
