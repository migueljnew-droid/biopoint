apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: biopoint-api-hpa
  namespace: biopoint-production
  labels:
    app: biopoint-api
    tier: backend
    component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: biopoint-api-deployment
  minReplicas: 3
  maxReplicas: 20
  metrics:
  # CPU utilization scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory utilization scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # Request rate scaling (custom metric)
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 90
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: v1
kind: Service
metadata:
  name: biopoint-api-service
  namespace: biopoint-production
  labels:
    app: biopoint-api
    tier: backend
spec:
  selector:
    app: biopoint-api
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 3000
    protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biopoint-api-deployment
  namespace: biopoint-production
  labels:
    app: biopoint-api
    tier: backend
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: biopoint-api
  template:
    metadata:
      labels:
        app: biopoint-api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: biopoint-api
        image: biopoint/api:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: biopoint-secrets
              key: database-url
        - name: DATABASE_POOL_SIZE
          value: "10"
        - name: DATABASE_POOL_TIMEOUT
          value: "30"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: biopoint-secrets
              key: redis-url
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health/api
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 30