services:
  - type: web
    name: biopoint-api
    runtime: node
    region: virginia
    plan: free
    rootDir: .
    buildCommand: npm install --force && cd db && npx prisma generate && cd ../packages/shared && npx tsc || true && cd ../apps/api && npx tsc
    startCommand: node --import tsx apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        value: "15m"
      - key: JWT_REFRESH_EXPIRES
        value: "7d"
      - key: AWS_REGION
        value: "auto"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        value: "biopoint-uploads"
      - key: S3_ENDPOINT
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FEATURE_GEMINI_LAB_ANALYSIS
        value: "true"
      - key: FEATURE_AI_SUGGESTIONS
        value: "true"
      - key: CORS_ORIGIN
        value: "biopoint://*,https://biopoint-api.onrender.com"
      - key: PORT
        value: "3000"
